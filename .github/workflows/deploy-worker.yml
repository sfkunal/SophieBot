name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "apps/worker/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w @brain/shared

      - name: Validate Cloudflare API token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID repository secret."
            exit 1
          fi

          token_len=${#CLOUDFLARE_API_TOKEN}
          if [ "$token_len" -lt 40 ]; then
            echo "::error::CLOUDFLARE_API_TOKEN looks too short (${token_len} chars). It should be a Cloudflare API Token from dash.cloudflare.com/profile/api-tokens — not your account ID (${CLOUDFLARE_ACCOUNT_ID})."
            exit 1
          fi

          if [ "${CLOUDFLARE_API_TOKEN}" = "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN matches CLOUDFLARE_ACCOUNT_ID. The token must be a separate API Token value from the Cloudflare dashboard."
            exit 1
          fi

          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts")

          body="${response%HTTP_STATUS:*}"
          status="${response##*HTTP_STATUS:}"

          if [ "$status" != "200" ]; then
            echo "::error::Cloudflare API token validation failed (HTTP ${status}). Recreate an Account API token with Workers Scripts Edit + D1 Edit for your account, then update the CLOUDFLARE_API_TOKEN secret (use printf to avoid trailing newlines)."
            echo "$body" | head -c 400
            exit 1
          fi

          echo "Cloudflare API token validated."

      - name: Deploy to Cloudflare Workers
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Apply D1 migrations (remote)
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply brain-db --remote
