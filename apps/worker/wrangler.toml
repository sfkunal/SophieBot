name = "brain-worker"
main = "src/index.ts"
compatibility_date = "2024-12-18"

[[d1_databases]]
binding = "DB"
database_name = "brain-db"
database_id = "5797ba58-7062-4abd-ac99-6c14f85fccbd"
migrations_dir = "migrations"

[vars]
APP_URL = "https://brain-worker.sophiebot.workers.dev"
WEB_URL = "https://sfkunal.github.io/SophieBot/"
GOOGLE_REDIRECT_URI = "https://brain-worker.sophiebot.workers.dev/api/auth/google/callback"

# Secrets (set via `wrangler secret put`):
# TWILIO_ACCOUNT_SID
# TWILIO_AUTH_TOKEN
# TWILIO_PHONE_NUMBER
# TELEGRAM_BOT_TOKEN
# TELEGRAM_WEBHOOK_SECRET
# TELEGRAM_BOT_USERNAME
# OPENAI_API_KEY
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# ALLOWED_PHONES
# AUTH_SECRET

[triggers]
crons = ["0 18 * * 5"]
